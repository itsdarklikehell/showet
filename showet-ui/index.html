<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showet - Demo Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        h1 { color: #4ecca3; margin-bottom: 10px; }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            background: #fff;
            color: #111;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            background: #4ecca3;
            color: #111;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #3dbc8e; }
        .results { margin-top: 20px; }
        .prod-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prod-info { flex: 1; }
        .prod-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .prod-meta { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .prod-content { display: flex; align-items: center; }
        .prod-screenshot {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .no-screenshot {
            width: 80px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
        }
        .run-btn {
            padding: 8px 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .run-btn:hover { background: #ff6b6b; }
        .loading { text-align: center; padding: 40px; color: #4ecca3; }
        .platforms { margin: 10px 0; font-size: 14px; color: #888; }
        .error { color: #e94560; padding: 10px; text-align: center; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .nav-tab {
            padding: 10px 20px;
            background: none;
            color: #888;
            border: none;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
        }
        .nav-tab.active {
            color: #4ecca3;
            background: rgba(255,255,255,0.05);
        }
        .nav-tab:hover:not(.active) {
            color: #bbb;
        }
        .fav-btn {
            padding: 8px 12px;
            background: #f1c40f;
            color: #111;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .fav-btn.favorited {
            background: #f39c12;
        }
        .cache-info {
            background: rgba(78, 204, 163, 0.1);
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 14px;
        }
        .random-btn {
            background: #9b59b6;
            color: white;
        }
        .random-btn:hover { background: #8e44ad; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕹️ Showet Demo Viewer</h1>
            <p>Browse and run demos from pouet.net</p>
            <div class="platforms" id="platforms">Loading platforms...</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for demos..." />
                <button onclick="search()">Search</button>
                <button class="random-btn" onclick="randomDemo()">🎲 Random</button>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('search')">🔍 Search</button>
                <button class="nav-tab" onclick="switchTab('favorites')">⭐ Favorites</button>
                <button class="nav-tab" onclick="switchTab('cache')">💾 Cache</button>
            </div>
        </header>
        <div class="results" id="results"></div>
        <footer style="text-align: center; margin-top: 40px; color: #666; font-size: 14px;">
            <p>Showet Demo Viewer • <a href="https://github.com/itsdarklikehell/showet" style="color: #4ecca3;">GitHub</a></p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentSearchQuery = '';
        let currentTab = 'search';
        let favorites = new Set();
        let cachedDemos = new Set();

        // Load platforms on start
        async function loadPlatforms() {
            try {
                const res = await fetch(API_BASE + '/platforms');
                const data = await res.json();
                document.getElementById('platforms').textContent = 
                    'Platforms: ' + data.platforms.slice(0, 10).join(', ') + '...';
            } catch (e) {
                document.getElementById('platforms').innerHTML = '<span class="error">API unavailable (is showet-api running?)</span>';
            }
        }

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            currentSearchQuery = query;
            await performSearch(query);
        }

        async function performSearch(query) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔍 Searching pouet.net...</div>';

            try {
                const res = await fetch(API_BASE + '/search?q=' + encodeURIComponent(query));
                if (!res.ok) throw new Error('API returned ' + res.status);
                const data = await res.json();
                
                if (!data.success || !data.results) {
                    resultsDiv.innerHTML = '<div class="loading">No results found. Try a different search term.</div>';
                    return;
                }

                const results = Object.entries(data.results);
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">No demos found for "' + query + '"</div>';
                    return;
                }

                await loadFavoritesAndCache();
                renderResults(results, data.results);
            } catch (e) {
                resultsDiv.innerHTML = '<div class="error">Search failed: ' + e.message + ' <br/><small>Make sure showet-api is running on localhost:8765</small></div>';
            }
        }

        async function renderResults(results, allResults) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = results.map(([id, prod]) => {
                const screenshotUrl = prod.screenshot || '';
                const isFav = favorites.has(parseInt(id));
                const isCached = cachedDemos.has(parseInt(id));
                const imgHtml = screenshotUrl ? 
                    `<img class="prod-screenshot" src="${screenshotUrl}" alt="${prod.name}" onerror="this.parentElement.innerHTML='No Preview';" />` :
                    `<div class="no-screenshot">No Preview</div>`;
                return `
                    <div class="prod-card">
                        <div class="prod-content">
                            ${imgHtml}
                            <div class="prod-info">
                                <div class="prod-name">${prod.name}</div>
                                <div class="prod-meta">
                                    Type: ${prod.type || 'unknown'} | 
                                    Year: ${(prod.releaseDate || '').split('-')[0] || 'N/A'} |
                                    Votes: ${prod.voteup || 0} |
                                    ${isCached ? '💾 Cached' : ''}
                                </div>
                            </div>
                        </div>
                        <div>
                            <button class="fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(${prod.id}, '${prod.name.replace(/'/g, "\\'")}')">⭐</button>
                            <button class="run-btn" onclick="runDemo(${prod.id})">Run</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadFavoritesAndCache() {
            try {
                const favRes = await fetch(API_BASE + '/favorites');
                const favData = await favRes.json();
                if (favData.success) {
                    favorites = new Set(favData.favorites.map(f => f.id));
                }

                const cacheRes = await fetch(API_BASE + '/cache');
                const cacheData = await cacheRes.json();
                if (cacheData.success) {
                    cachedDemos = new Set(cacheData.demos.map(d => d.id));
                }
            } catch (e) {
                console.log('Could not load favorites/cache:', e);
            }
        }

        async function runDemo(id) {
            const btn = event.target;
            btn.textContent = 'Launching...';
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + '/run/' + id, { method: 'POST' });
                if (!res.ok) throw new Error('Server returned ' + res.status);
                const data = await res.json();
                if (data.success) {
                    btn.textContent = '✓ Launched';
                    setTimeout(() => { btn.textContent = 'Run'; btn.disabled = false; }, 2000);
                } else {
                    alert('Could not launch: ' + (data.message || data.error));
                    btn.textContent = 'Run';
                    btn.disabled = false;
                }
            } catch (e) {
                alert('Failed to run demo: ' + e.message);
                btn.textContent = 'Run';
                btn.disabled = false;
            }
        }

        async function toggleFavorite(id, name) {
            const btn = event.target;
            const isFav = favorites.has(id);

            if (isFav) {
                try {
                    const res = await fetch(API_BASE + '/favorites/' + id, { method: 'DELETE' });
                    if (res.ok) {
                        favorites.delete(id);
                        btn.classList.remove('favorited');
                    }
                } catch (e) {
                    alert('Failed to remove favorite: ' + e.message);
                }
            } else {
                try {
                    const res = await fetch(API_BASE + '/favorites/' + id, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name })
                    });
                    if (res.ok) {
                        favorites.add(id);
                        btn.classList.add('favorited');
                    }
                } catch (e) {
                    alert('Failed to add favorite: ' + e.message);
                }
            }
        }

        async function randomDemo() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🎲 Finding a random demo...</div>';

            try {
                const res = await fetch(API_BASE + '/random');
                if (!res.ok) throw new Error('API returned ' + res.status);
                const data = await res.json();
                if (data.success) {
                    await loadFavoritesAndCache();
                    const prod = data;
                    await renderResults([[data.id, data]], { [data.id]: data });
                } else {
                    resultsDiv.innerHTML = '<div class="loading">Could not find a random demo. Try again!</div>';
                }
            } catch (e) {
                resultsDiv.innerHTML = '<div class="error">Failed to get random demo: ' + e.message + '</div>';
            }
        }

        async function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.nav-tab[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');

            const resultsDiv = document.getElementById('results');

            if (tab === 'search') {
                resultsDiv.innerHTML = '<div class="loading">Search for demos above...</div>';
            } else if (tab === 'favorites') {
                await showFavorites();
            } else if (tab === 'cache') {
                await showCache();
            }
        }

        async function showFavorites() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">⭐ Loading favorites...</div>';

            try {
                const res = await fetch(API_BASE + '/favorites');
                const data = await res.json();
                
                if (data.success && data.favorites.length > 0) {
                    await loadFavoritesAndCache();
                    renderResults(data.favorites.map(f => [f.id.toString(), {
                        name: f.name,
                        type: 'favorite',
                        releaseDate: f.added_at,
                        voteup: 0
                    }]), {});
                } else {
                    resultsDiv.innerHTML = '<div class="loading">No favorites yet. Search for demos and star them! ⭐</div>';
                }
            } catch (e) {
                resultsDiv.innerHTML = '<div class="error">Failed to load favorites: ' + e.message + '</div>';
            }
        }

        async function showCache() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">💾 Loading cache...</div>';

            try {
                const res = await fetch(API_BASE + '/cache');
                const data = await res.json();
                
                if (data.success) {
                    resultsDiv.innerHTML = `
                        <div class="cache-info">
                            <strong>📦 Cache Stats:</strong><br/>
                            Cached demos: ${data.count}<br/>
                            Total size: ${data.cache_size_human}
                        </div>
                    `;

                    if (data.demos.length > 0) {
                        const demosHtml = data.demos.map(d => `
                            <div class="prod-card">
                                <div class="prod-info">
                                    <div class="prod-name">${d.metadata?.name || 'Demo #' + d.id}</div>
                                    <div class="prod-meta">
                                        Size: ${(d.metadata?.cached_at ? 'Cached' : 'Unknown')} |
                                        ID: ${d.id}
                                    </div>
                                </div>
                                <div>
                                    <button class="run-btn" onclick="runDemo(${d.id})">Run</button>
                                    <button class="run-btn" style="background:#e74c3c" onclick="clearDemo(${d.id})">Delete</button>
                                </div>
                            </div>
                        `).join('');
                        resultsDiv.innerHTML += demosHtml;
                    }
                }
            } catch (e) {
                resultsDiv.innerHTML = '<div class="error">Failed to load cache: ' + e.message + '</div>';
            }
        }

        async function clearDemo(id) {
            if (!confirm('Remove this demo from cache?')) return;

            try {
                const res = await fetch(API_BASE + '/cache/' + id, { method: 'DELETE' });
                if (res.ok) {
                    await showCache();
                }
            } catch (e) {
                alert('Failed to clear demo: ' + e.message);
            }
        }

        // Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });

        loadPlatforms();
    </script>
</body>
</html>
