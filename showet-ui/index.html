<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showet - Demo Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        h1 { color: #4ecca3; margin-bottom: 10px; }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            background: #fff;
            color: #111;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            background: #4ecca3;
            color: #111;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #3dbc8e; }
        .results { margin-top: 20px; }
        .prod-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prod-info { flex: 1; }
        .prod-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .prod-meta { font-size: 14px; color: #aaa; }
        .run-btn {
            padding: 8px 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .run-btn:hover { background: #ff6b6b; }
        .loading { text-align: center; padding: 40px; color: #4ecca3; }
        .platforms { margin: 10px 0; font-size: 14px; color: #888; }
        .error { color: #e94560; padding: 10px; text-align: center; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕹️ Showet Demo Viewer</h1>
            <p>Browse and run demos from pouet.net</p>
            <div class="platforms" id="platforms">Loading platforms...</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for demos..." />
                <button onclick="search()">Search</button>
            </div>
        </header>
        <div class="results" id="results"></div>
        <footer style="text-align: center; margin-top: 40px; color: #666; font-size: 14px;">
            <p>Showet Demo Viewer • <a href="https://github.com/itsdarklikehell/showet" style="color: #4ecca3;">GitHub</a></p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentSearchQuery = '';

        // Load platforms on start
        async function loadPlatforms() {
            try {
                const res = await fetch(API_BASE + '/platforms');
                const data = await res.json();
                document.getElementById('platforms').textContent = 
                    'Platforms: ' + data.platforms.slice(0, 10).join(', ') + '...';
            } catch (e) {
                document.getElementById('platforms').innerHTML = '<span class="error">API unavailable (is showet-api running?)</span>';
            }
        }

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            currentSearchQuery = query;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔍 Searching pouet.net...</div>';

            try {
                const res = await fetch(API_BASE + '/search?q=' + encodeURIComponent(query));
                if (!res.ok) throw new Error('API returned ' + res.status);
                const data = await res.json();
                
                if (!data.success || !data.results) {
                    resultsDiv.innerHTML = '<div class="loading">No results found. Try a different search term.</div>';
                    return;
                }

                const results = Object.entries(data.results);
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">No demos found for "' + query + '"</div>';
                    return;
                }

                resultsDiv.innerHTML = results
                    .map(([id, prod]) => `
                    <div class="prod-card">
                        <div class="prod-info">
                            <div class="prod-name">${prod.name}</div>
                            <div class="prod-meta">
                                Type: ${prod.type || 'unknown'} | 
                                Year: ${(prod.releaseDate || '').split('-')[0] || 'N/A'} |
                                Votes: ${prod.voteup || 0}
                            </div>
                        </div>
                        <button class="run-btn" onclick="runDemo(${prod.id})">Run</button>
                    </div>
                `).join('');
            } catch (e) {
                resultsDiv.innerHTML = '<div class="error">Search failed: ' + e.message + ' <br/><small>Make sure showet-api is running on localhost:8765</small></div>';
            }
        }

        async function runDemo(id) {
            const btn = event.target;
            btn.textContent = 'Launching...';
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + '/run/' + id, { method: 'POST' });
                if (!res.ok) throw new Error('Server returned ' + res.status);
                const data = await res.json();
                if (data.success) {
                    btn.textContent = '✓ Launched';
                    setTimeout(() => { btn.textContent = 'Run'; btn.disabled = false; }, 2000);
                } else {
                    alert('Could not launch: ' + (data.message || data.error));
                    btn.textContent = 'Run';
                    btn.disabled = false;
                }
            } catch (e) {
                alert('Failed to run demo: ' + e.message);
                btn.textContent = 'Run';
                btn.disabled = false;
            }
        }

        // Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });

        loadPlatforms();
    </script>
</body>
</html>
