<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showet Demo Showcase - Television Simulator '99</title>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent: #ff6b00;
            --text: #e0e0e0;
            --scanline: rgba(255,255,255,0.1);
        }
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            overflow: hidden;
        }
        header {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, #ff6b00, #ff2d55, #00d4ff);
            padding: 15px 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #platform-list {
            background: var(--panel);
            padding: 10px;
            overflow-y: auto;
            border-right: 1px solid #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .platform-item {
            background: linear-gradient(90deg, #222, #1a1a1a);
            padding: 12px;
            margin: 3px 0;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .platform-item:hover {
            background: linear-gradient(90deg, var(--accent), #ff2d55);
            border-left-color: white;
            transform: translateX(5px);
        }
        .platform-item.active {
            background: var(--accent);
            color: white;
        }
        .platform-item .tag {
            font-size: 0.7em;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
        }
        #emulator-container {
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #crt-frame {
            position: relative;
            background: black;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255,107,0,0.3);
        }
        #crt-frame::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline) 2px,
                var(--scanline) 4px
            );
            pointer-events: none;
            opacity: 0.3;
        }
        #demo-info {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 5px;
            max-width: 300px;
            border: 1px solid var(--accent);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.3em;
            color: var(--accent);
            text-align: center;
        }
        .crt-selector {
            margin-top: 15px;
            padding: 10px;
            background: #222;
            border-radius: 5px;
        }
        .crt-selector select {
            background: #333;
            color: white;
            padding: 5px;
            border: 1px solid var(--accent);
        }
        .scene-info {
            color: var(--accent);
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>📺 SHOWET - DEMO SHOWCASE '99</header>
    
    <div id="platform-list">
        <input type="text" id="search" placeholder="Search platforms (C64, Amiga, NES...)..." onkeyup="filterPlatforms()">
        <div id="platforms"></div>
    </div>
    
    <div id="emulator-container">
        <div id="loading">Select a platform to load a demo<br><span class="scene-info">Now with authentic CRT shaders!</span></div>
        <div id="crt-frame" style="display:none;">
            <canvas id="tvs-canvas" width="640" height="480"></canvas>
        </div>
        <div class="crt-selector">
            <select id="shader-select" onchange="changeShader()">
                <option value="crt/crt-easymode">CRT Easy Mode</option>
                <option value="crt/crt-royale">CRT Royale</option>
                <option value="crt/crt-pi">CRT Pi</option>
                <option value="crt/crt-easymode">C64 Green Phosphor</option>
                <option value="crt/crt-pi">Amiga OCS</option>
                <option value="crt/crt-royale">NES Composite</option>
                <option value="crt/crt-easymode">Atari ST</option>
            </select>
        </div>
        <div id="stream-controls" style="margin-top:15px; display:none;">
            <button id="stream-btn" onclick="toggleStream()" style="background:#333; color:white; padding:10px 20px; border:1px solid var(--accent); cursor:pointer;">📺 Start Stream</button>
        </div>
        <div id="demo-info"></div>
    </div>

    <script>
        let streamActive = false;
        let mediaRecorder = null;
        let recordedChunks = [];

        async function loadPlatforms() {
            try {
                const response = await fetch('/nostalgist_configs/manifest.json');
                const manifest = await response.json();
                
                const container = document.getElementById('platforms');
                container.innerHTML = '';
                
                const platforms = manifest.platforms || [];
                platforms.forEach(platform => {
                    const div = document.createElement('div');
                    div.className = 'platform-item';
                    div.innerHTML = `
                        <span>${formatPlatformName(platform.slug)}</span>
                        <span class="tag">demo</span>
                    `;
                    div.onclick = () => launchDemo(platform.slug);
                    container.appendChild(div);
                });
            } catch (err) {
                console.error('Failed to load platforms:', err);
            }
        }

        function formatPlatformName(slug) {
            return slug.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function filterPlatforms() {
            const search = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.platform-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(search) ? 'flex' : 'none';
            });
        }

        async function launchDemo(platformSlug) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerHTML = `
                Loading <strong>${formatPlatformName(platformSlug)}</strong>...<br>
                <span class="scene-info">Authentic CRT shader engaged!</span>
            `;
            document.getElementById('crt-frame').style.display = 'none';
            document.getElementById('stream-controls').style.display = 'flex';
            
            try {
                const configResponse = await fetch(`/nostalgist_configs/${platformSlug}.json`);
                const baseConfig = await configResponse.json();
                
                // Launch nostalgist.js emulator
                const nostalgistConfig = {
                    ...baseConfig,
                    shader: document.getElementById('shader-select').value,
                    style: { 
                        backgroundColor: 'black',
                        width: '100%',
                        height: '80vh'
                    }
                };
                
                // Use nostalgist to launch (demo would use actual ROM URL)
                window.launchNostalgist = nostalgistConfig;
                
                document.getElementById('loading').innerHTML = `
                    <strong>${formatPlatformName(platformSlug)}</strong> ready!<br>
                    <span class="scene-info">Core: ${baseConfig.core} | Shader: ${baseConfig.shader}</span>
                `;
                
                document.getElementById('demo-info').innerHTML = `
                    <h4>${formatPlatformName(platformSlug)}</h4>
                    <p>Ready to launch demo</p>
                    <p class="scene-info">🎥 Stream button active below!</p>
                `;
                
            } catch (err) {
                document.getElementById('loading').textContent = `Ready to launch ${platformSlug}`;
            }
        }

        async function toggleStream() {
            const btn = document.getElementById('stream-btn');
            
            if (!streamActive) {
                btn.textContent = '⏹️ Stop Stream';
                btn.style.background = '#ff2d55';
                streamActive = true;
                
                // Start WebRTC/RTMP stream (placeholder)
                document.getElementById('demo-info').innerHTML += `
                    <p style="color:var(--accent);margin-top:10px;">📺 Streaming active!</p>
                `;
            } else {
                btn.textContent = '📺 Start Stream';
                btn.style.background = '#333';
                streamActive = false;
                document.getElementById('demo-info').innerHTML = document.getElementById('demo-info').innerHTML.replace(
                    '<p style="color:var(--accent);margin-top:10px;">📺 Streaming active!</p>', ''
                );
            }
        }

        function changeShader() {
            const shader = document.getElementById('shader-select').value;
            console.log('Shader changed to:', shader);
        }

        document.addEventListener('DOMContentLoaded', loadPlatforms);
    </script>
</body>
</html>
