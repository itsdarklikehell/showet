<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showet - nostalgist.js Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.min.js"></script>
    <script src="showet-audio.js"></script>
    <script src="sound_design/showet-sound-theme-manager.js"></script>
    <script src="showet-timeline.js"></script>
    <script src="showet-party-client.js"></script>
    <script src="showet-museum-mode.js"></script>
    <script src="showet-shader-playground.js"></script>
    <script src="showet-preview-clips.js"></script>
    <script src="showet-knowledge.js"></script>
    <script src="showet-spectrum.js"></script>
    <script src="showet-tour-player.js"></script>
    <script src="showet-boot-sequence.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; color: white; font-family: monospace; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #222; border-radius: 8px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-size: 0.8em; color: #888; margin-bottom: 4px; }
        .control-group select { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; }
        .platform-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .platform-item { background: #333; padding: 15px; cursor: pointer; border-radius: 5px; text-align: center; transition: all 0.2s; }
        .platform-item:hover { background: #555; transform: translateY(-2px); }
        .platform-item.selected { background: #0066cc; box-shadow: 0 0 10px rgba(0, 102, 204, 0.5); }
        #emulator-container { margin-top: 20px; }
        .loading-screen { margin-bottom: 20px; padding: 20px; background: #000; border-radius: 8px; min-height: 200px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading-screen"></div>
        
        <h1>📺 Showet nostalgist.js Viewer</h1>
        <p>Select a platform to load its demo configuration:</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="shader-select">Shader</label>
                <select id="shader-select">
                    <option value="crt/crt-easymode">CRT Easymode</option>
                    <option value="crt/crt-royale">CRT Royale</option>
                    <option value="crt/crt-pi">CRT Pi</option>
                </select>
            </div>
            <div class="control-group">
                <label for="sound-theme-selector">Ambience</label>
                <select id="sound-theme-selector">
                    <option value="silent">Silent</option>
                    <option value="c64">C64 Room Tone</option>
                    <option value="amiga">Amiga Workbench Hum</option>
                    <option value="dos">DOS PC Speaker</option>
                </select>
            </div>
        </div>
        
        <div class="platform-list" id="platform-list"></div>
        <div id="emulator-container"></div>
    </div>

    <script>
        // Load platform configs from Showet
        const platformConfigs = {}; // Populated by server or static generation
        
        // Example: Load a single config
        async function launchPlatform(slug) {
            const response = await fetch(`/nostalgist-configs/${slug}.json`);
            const config = await response.json();
            
            // Modify ROM path to use actual demo file
            const demoUrl = config.rom; // Should point to your demo file
            
            try {
                const nostalgist = await Nostalgist.launch({
                    core: config.core,
                    rom: demoUrl,
                    shader: config.shader || 'crt/crt-easymode',
                    style: { backgroundColor: 'black', width: '100%', height: '80vh' }
                });
                console.log('Emulator launched for:', slug);
            } catch (err) {
                console.error('Failed to launch emulator:', err);
            }
        }
        
        // Generate platform UI from available configs
        async function initPlatformList() {
            // Config files use underscores: nintendo_famicom, commodore_64, etc.
            const platforms = [
                'nintendo_famicom', 'atari_xlxe', 'commodore_64', 'sega_megadrive',
                'nintendo_superfamicom', 'sony_psx', 'commodore_amiga'
                // ... add more as needed
            ];
            
            const list = document.getElementById('platform-list');
            platforms.forEach(slug => {
                const item = document.createElement('div');
                item.className = 'platform-item';
                item.textContent = slug;
                item.onclick = () => launchPlatform(slug);
                list.appendChild(item);
            });
        }
        
        initPlatformList();
    </script>
</body>
</html>
