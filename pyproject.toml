[project]
name = "showet"
version = "0.1.0"
description = "Demo viewer using Pouet.net metadata."
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
dependencies = [
    "inquirer>=3.4",
    "patool>=4.0",
]

[project.scripts]
showet = "showet:main"
showet-api = "showet_api:main"
showet-webui = "showet_webui:launch_browser"

[project.urls]
Homepage = "https://github.com/itsdarklikehell/showet"
Repository = "https://github.com/itsdarklikehell/showet"

[tool.ruff]
line-length = 88
target-version = "py310"
extend-exclude = [
    ".history",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",
]
